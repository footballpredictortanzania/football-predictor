<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-League Match Predictor</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0b0f19; color: #f1f5f9; padding: 40px 20px; margin: 0; }
        .container { max-width: 700px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; font-size: 14px; }
        
        /* Dropdown Styling */
        .selector-box { text-align: center; margin-bottom: 30px; background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        select { padding: 10px 20px; font-size: 16px; border-radius: 6px; background: #0f172a; color: white; border: 1px solid #475569; cursor: pointer; font-weight: bold; }
        
        .loading { text-align: center; font-size: 18px; color: #38bdf8; margin-top: 50px; display: none; }
        .match-card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; box-shadow: 0 4px 10px rgba(0,0,0,0.3); animation: fadeIn 0.3s ease; }
        .teams-title { font-size: 20px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .xg-info { display: flex; justify-content: space-between; font-size: 14px; color: #94a3b8; margin: 12px 0; }
        .stats-grid { display: flex; gap: 15px; margin-top: 15px; }
        .stat-box { flex: 1; background: #0f172a; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #1e293b; }
        .stat-val { font-size: 22px; font-weight: bold; margin-top: 5px; }
        .under-val { color: #f87171; }
        .over-val { color: #4ade80; }
        .advice-banner { margin-top: 15px; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; background: #334155; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>⚽ Football Poisson Predictor</h1>
            <p class="subtitle">Chagua ligi kuona uchambuzi wa mechi za leo kutoka kwenye injini yako ya Python</p>
        </header>

        <div class="selector-box">
            <label for="leagueSelect" style="margin-right: 10px; font-weight: bold;">Chagua Ligi ya Leo:</label>
            <select id="leagueSelect" onchange="loadPredictions()">
                <option value="4-2026">🏆 UEFA Euro Championship (Msimu 2026)</option>
                <option value="13-2026">🏆 Copa Libertadores (Msimu 2026)</option>
                <option value="71-2026">🇧🇷 Brazil Serie A (Msimu 2026)</option>
                <option value="39-2026">🏴󠁧󠁢󠁥󠁮󠁧󠁿 English Premier League (Msimu 2026)</option>
                <option value="61-2026">🇫🇷 France Ligue 1 (Msimu 2026)</option>
                <option value="10-2026">🌍 International Friendlies (Msimu 2026)</option>
            </select>
        </div>

        <div id="loading" class="loading">Inatafuta mechi na kupiga hesabu...</div>
        <div id="matchContainer"></div>
    </div>

    <script>
        async function loadPredictions() {
            const container = document.getElementById('matchContainer');
            const loading = document.getElementById('loading');
            const selector = document.getElementById('leagueSelect');

            const [leagueId, season] = selector.value.split('-');

            container.innerHTML = '';
            loading.style.display = 'block';
            loading.innerText = "Inatafuta mechi na kupiga hesabu...";

            try {
                const response = await fetch('https://football-predictor-any6.onrender.com/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        league_id: parseInt(leagueId), 
                        season: parseInt(season) 
                    })
                });
                
                const result = await response.json();
                loading.style.display = 'none';

                if (!result.matches || result.matches.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding:30px; color:#94a3b8; background:#1e293b; border-radius:8px;">⚠️ Hakuna mechi zijazo zilizopatikana kwa sasa kwenye msimu huu wa ligi hii.</div>`;
                    return;
                }

                result.matches.forEach(match => {
                    const card = document.createElement('div');
                    card.className = 'match-card';
                    card.innerHTML = `
                        <div style="font-size:12px; color:#94a3b8; margin-bottom:8px;">📅 Tarehe: ${match.date}</div>
                        <div class="teams-title">
                            <span>${match.home}</span> 
                            <span style="color:#64748b; font-size:14px; align-self:center;">VS</span> 
                            <span>${match.away}</span>
                        </div>
                        <div class="xg-info">
                            <span>Expected Goals (H): <strong>${match.home_xg}</strong></span>
                            <span>Expected Goals (A): <strong>${match.away_xg}</strong></span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:13px; margin: 5px 0; background:#0f172a; padding:8px; border-radius:6px;">
                            <span>1: <strong>${match.home_win}%</strong></span>
                            <span>X: <strong>${match.draw}%</strong></span>
                            <span>2: <strong>${match.away_win}%</strong></span>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-box">
                                <div style="font-size:12px; color:#94a3b8;">UNDER 2.5</div>
                                <div class="stat-val under-val">${match.under_25}%</div>
                            </div>
                            <div class="stat-box">
                                <div style="font-size:12px; color:#94a3b8;">OVER 2.5</div>
                                <div class="stat-val over-val">${
