<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinOddsPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #060d19;
            --panel-bg: rgba(16, 26, 44, 0.65);
            --neon-cyan: #00f0ff;
            --neon-green: #39ff14;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
            --border-glow: rgba(0, 240, 255, 0.2);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-white);
            margin: 0;
            padding: 15px;
            background-image: radial-gradient(circle at top right, #0d203d, #060d19 70%);
            padding-bottom: 80px; /* Ili menyu ya chini isifiche kadi */
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 1. SEHEMU YA JUU (TOP ROW: PLAYER, ADS & LOGO) */
        .top-grid {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .top-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Kadi ya Mchezaji */
        .player-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
        }

        .player-card h3 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .player-img {
            position: absolute;
            right: 0;
            bottom: 0;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 1;
        }

        .arrow-indicator {
            color: var(--neon-cyan);
            font-size: 24px;
            font-weight: bold;
            z-index: 2;
        }

        /* Kadi ya Matangazo */
        .ads-card {
            background: var(--panel-bg);
            border: 1px solid rgba(57, 255, 20, 0.2);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.05);
        }

        .ads-card h4 {
            margin: 0;
            color: var(--neon-green);
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .ads-text {
            font-size: 13px;
            color: var(--text-gray);
            line-height: 1.5;
            margin: 10px 0;
        }

        .ads-btn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            width: fit-content;
            transition: 0.3s;
        }
        .ads-btn:hover {
            background: var(--neon-green);
            color: #000;
        }

        /* Kadi ya Logo iliyoboreshwa */
.logo-card {
    background: rgba(16, 26, 44, 0.65); /* Inalingana na maboksi mengine */
    border: 1px solid rgba(0, 240, 255, 0.2);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0; /* Tumeondoa padding ili picha ijae hadi kingoni */
    overflow: hidden; /* Inazuia picha isitoke nje ya boksi */
    min-height: 180px; /* Inalingana urefu sawa na kadi ya mchezaji */
}

/* Picha ya Logo ijae kikamilifu */
.logo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Inafanya logo ijaze boksi lote kama picha ya app */
    display: block;
}

        /* 2. DROPDOWN SELECTION */
        .league-selector-zone {
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .league-selector-zone label {
            display: block;
            font-size: 13px;
            color: var(--neon-green);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .custom-select {
            width: 100%;
            padding: 12px;
            background: #091220;
            color: var(--text-white);
            border: 1px solid rgba(0, 240, 255, 0.4);
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        /* 3. UCHAMBUZI WA MECHI */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-left: 5px;
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
        }

        @media (max-width: 500px) {
            .matches-grid {
                grid-template-columns: 1fr;
            }
        }

        .match-box {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
        }

        .teams-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .vs-divider {
            font-size: 11px;
            background: #091220;
            color: var(--neon-cyan);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        .xg-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-gray);
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        /* PRGORESS BARS (Mishale ya Asilimia) */
        .percentages-zone {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            font-size: 13px;
        }

        .bar-label {
            width: 65px;
            font-weight: 600;
            color: var(--text-gray);
        }

        .bar-track {
            flex: 1;
            height: 8px;
            background: #091220;
            border-radius: 4px;
            margin: 0 12px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green));
            border-radius: 4px;
        }

        .bar-number {
            width: 40px;
            text-align: right;
            font-weight: 700;
            color: var(--neon-cyan);
        }

        /* UNDER / OVER SECTION */
        .ou-row {
            display: flex;
            gap: 12px;
        }

        .ou-container {
            flex: 1;
            background: #091220;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .ou-lbl {
            font-size: 11px;
            color: var(--text-gray);
            margin-bottom: 3px;
        }

        .ou-num {
            font-size: 16px;
            font-weight: 700;
            color: var(--neon-green);
        }

        /* 4. BOTTOM MENYUBAR (BOTTOM NAVIGATION) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0a1322;
            border-top: 1px solid rgba(0, 240, 255, 0.15);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active, .nav-item:hover {
            color: var(--neon-green);
        }

        .loading-text {
            text-align: center;
            color: var(--neon-cyan);
            font-weight: bold;
            padding: 30px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        
         <!-- ROW YA JUU: PLAYER SHOWCASE, MATANGAZO, LOGO -->
        <div class="top-grid">
            <!-- 1. Kadi ya Mchezaji (Player Showcase) -->
            <div class="player-card">
                <h3>Player<br>Showcase</h3>
                <div class="arrow-indicator">
                    <i class="fas fa-arrow-left"></i>
                </div>
                <img src="mchezaji.png" alt="Mchezaji" class="player-img">
            </div>

            <!-- 2. Kadi ya Matangazo -->
            <div class="ads-card">
                <h4>Matangazo</h4>
                <div class="ads-text">Exclusive Sign up Bonus for new WinOddsPro users in Dar es Salaam!</div>
                <button class="ads-btn">Onyesha Bonasi</button>
            </div>

            <div class="logo-card">
                <img src="WINN ODDS PRO LOGO.png" alt="WinOddsPro Logo">
            </div>
        </div>

        <div class="league-selector-zone">
            <label for="leagueSelect">Chagua Ligi ya Leo:</label>
            <select id="leagueSelect" class="custom-select" onchange="fetchPredictions()">
                <option value="39-2026">🏴󠁧󠁢󠁥󠁮󠁧󠁿 English Premier League</option>
                <option value="4-2026">🏆 UEFA Euro Championship</option>
                <option value="13-2026">🏆 Copa Libertadores</option>
                <option value="71-2026">🇧🇷 Brazil Serie A </option>
                <option value="61-2026">🇫🇷 France Ligue 1 </option>
            </select>
        </div>

        <div class="section-title">Uchambuzi wa Mechi</div>
        
        <div id="loading" class="loading-text"><i class="fas fa-spinner fa-spin"></i> Inapakia ...</div>
        <div id="matchContainer" class="matches-grid"></div>

    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-item"><i class="fas fa-soccer-ball"></i>Matches</a>
        <a href="#" class="nav-item"><i class="fas fa-chart-line"></i>Analysis</a>
        <a href="#" class="nav-item"><i class="fas fa-user"></i>Profile</a>
    </div>

    <script>
        async function fetchPredictions() {
            const container = document.getElementById('matchContainer');
            const loading = document.getElementById('loading');
            const selector = document.getElementById('leagueSelect');
            const [leagueId, season] = selector.value.split('-');

            container.innerHTML = '';
            loading.style.display = 'block';

            try {
                const response = await fetch('https://football-predictor-any6.onrender.com/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ league_id: parseInt(leagueId), season: parseInt(season) })
                });
                
                const result = await response.json();
                loading.style.display = 'none';

                if (!result.matches || result.matches.length === 0) {
                    container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:30px; color:var(--text-gray);">⚠️ Hakuna mechi zilizopatikana kwa sasa kwenye ligi hii.</div>`;
                    return;
                }

                result.matches.forEach(match => {
                    const box = document.createElement('div');
                    box.className = 'match-box';
                    box.innerHTML = `
                        <div class="match-header">
                            <span>📅 ${match.date}</span>
                            <span style="color:var(--neon-green); font-weight:bold;">Poisson Live</span>
                        </div>
                        <div class="teams-row">
                            <div>${match.home}</div>
                            <div class="vs-divider">VS</div>
                            <div>${match.away}</div>
                        </div>
                        <div class="xg-row">
                            <span>xG (H): <strong>${match.home_xg}</strong></span>
                            <span>xG (A): <strong>${match.away_xg}</strong></span>
                        </div>
                        <div class="percentages-zone">
                            <div class="bar-item">
                                <div class="bar-label">Home %</div>
                                <div class="bar-track"><div class="bar-fill" style="width: ${match.home_win}%"></div></div>
                                <div class="bar-number">${match.home_win}%</div>
                            </div>
                            <div class="bar-item">
                                <div class="bar-label">Draw %</div>
                                <div class="bar-track"><div class="bar-fill" style="width: ${match.draw}%"></div></div>
                                <div class="bar-number">${match.draw}%</div>
                            </div>
                            <div class="bar-item">
                                <div class="bar-label">Away %</div>
                                <div class="bar-track"><div class="bar-fill" style="width: ${match.away_win}%"></div></div>
                                <div class="bar-number">${match.away_win}%</div>
                            </div>
                        </div>
                        <div class="ou-row">
                            <div class="ou-container">
                                <div class="ou-lbl">Under 2.5 %</div>
                                <div class="ou-num">${match.under_25}%</div>
                            </div>
                            <div class="ou-container">
                                <div class="ou-lbl">Over 2.5 %</div>
                                <div class="ou-num">${match.over_25}%</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(box);
                });
            } catch (error) {
                loading.style.display = 'none';
                container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:30px; color:#ff4a4a;">❌ Hitilafu ya mawasiliano na seva imetokea.</div>`;
            }
        }

        // Pakia mechi mara tu ukurasa unapofunguka
        document.addEventListener("DOMContentLoaded", () => { fetchPredictions(); });
    </script>
</body>
</html>
